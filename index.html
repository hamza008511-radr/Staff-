<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ODC STAFF</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --accent:      #0d9488;
            --accent-dark: #0b7a70;
            --accent-light:#f0fdfa;
            --bg:          #f4f8f7;
            --card:        #ffffff;
            --text:        #0d2b28;
            --muted:       #6b8e8b;
            --border:      #d1e6e3;
            --green:       #059669;
            --red:         #dc2626;
            --amber:       #d97706;
            --amber-bg:    #fffbeb;
            --wa:          #25d366;
            --mono:        'IBM Plex Mono', monospace;
        }
        body { background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; color: var(--text); min-height: 100vh; }

        nav { background: linear-gradient(135deg,#0d9488,#0c6e68); color:white; padding:14px 18px 9px; position:sticky; top:0; z-index:20; box-shadow:0 4px 24px rgba(13,148,136,.28); }
        .nav-r1 { display:flex; justify-content:space-between; align-items:center; }
        nav h1 { font-family:var(--mono); font-size:19px; font-weight:700; letter-spacing:-.4px; }
        .nav-credit { font-size:9.5px; font-weight:600; opacity:.65; letter-spacing:.9px; text-transform:uppercase; margin-top:3px; }
        .nav-credit b { opacity:1; font-style:italic; }
        .menu-btn { background:rgba(255,255,255,.18); border:none; color:white; width:38px; height:38px; border-radius:12px; cursor:pointer; font-size:22px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
        .menu-btn:active { background:rgba(255,255,255,.3); }

        .top-bar { background:linear-gradient(135deg,#0d9488,#0c6e68); padding:10px 16px 30px; display:flex; flex-direction:column; gap:8px; }
        .top-bar input[type=text] { width:100%; padding:13px 18px; border-radius:16px; border:none; font-size:15px; outline:none; font-family:'Plus Jakarta Sans',sans-serif; box-shadow:0 8px 24px rgba(0,0,0,.14); color:var(--text); }
        .top-bar input::placeholder { color:#9fc8c5; }
        .filter-row { display:flex; gap:7px; flex-wrap:wrap; }
        .filter-row select { flex:1; min-width:110px; padding:8px 12px; border-radius:12px; border:none; font-family:'Plus Jakarta Sans',sans-serif; font-size:12px; font-weight:700; background:rgba(255,255,255,.2); color:white; outline:none; cursor:pointer; }
        .filter-row select option { color:var(--text); background:white; }
        .sort-btn { background:rgba(255,255,255,.2); border:none; color:white; border-radius:12px; padding:8px 13px; font-size:11px; font-weight:700; cursor:pointer; white-space:nowrap; font-family:'Plus Jakarta Sans',sans-serif; }

        .month-banner { margin:0 14px; margin-top:-16px; background:white; border-radius:18px; border:1.5px solid var(--border); padding:12px 16px; display:flex; justify-content:space-between; align-items:center; box-shadow:0 2px 12px rgba(13,148,136,.08); margin-bottom:4px; }
        .month-banner label { font-size:10px; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; }
        .month-banner input[type=month] { border:1.5px solid var(--border); border-radius:10px; padding:6px 10px; font-family:var(--mono); font-size:13px; font-weight:700; color:var(--text); outline:none; background:var(--accent-light); }
        .month-banner input[type=month]:focus { border-color:var(--accent); }

        #results { padding:10px 14px 14px; display:flex; flex-direction:column; gap:12px; }
        .empty { text-align:center; margin-top:52px; color:var(--muted); font-size:14px; line-height:2.2; }

        .emp-card { background:var(--card); border-radius:22px; border:1.5px solid var(--border); box-shadow:0 2px 14px rgba(13,148,136,.08); overflow:hidden; cursor:pointer; transition:transform .1s; }
        .emp-card:active { transform:scale(.985); }
        .ch { padding:15px 18px 11px; border-bottom:1px solid #e2efed; }
        .ch-top { display:flex; justify-content:space-between; align-items:flex-start; }
        .ch-name { font-size:17px; font-weight:800; line-height:1.2; }
        .status-badge { font-size:9px; font-weight:800; padding:3px 9px; border-radius:20px; text-transform:uppercase; letter-spacing:.5px; flex-shrink:0; }
        .s-active { background:#d1fae5; color:#065f46; }
        .s-leave  { background:#fef3c7; color:#92400e; }
        .s-term   { background:#fee2e2; color:#991b1b; }
        .ch-meta { display:flex; gap:7px; margin-top:5px; flex-wrap:wrap; align-items:center; }
        .bw { background:var(--accent-light); color:var(--accent); font-size:10px; font-weight:700; padding:3px 10px; border-radius:20px; text-transform:uppercase; }
        .bn { background:var(--amber-bg); color:var(--amber); font-size:10px; font-weight:700; padding:3px 10px; border-radius:20px; }
        .ch-mob { font-size:11px; color:var(--muted); font-family:var(--mono); margin-top:5px; display:flex; align-items:center; gap:6px; }
        .call-btn { background:var(--accent-light); color:var(--accent); border:none; border-radius:8px; padding:3px 10px; font-size:10px; font-weight:700; cursor:pointer; text-decoration:none; display:inline-block; }
        .wa-btn   { background:#e7fdf0; color:var(--wa); border:none; border-radius:8px; padding:3px 10px; font-size:10px; font-weight:700; cursor:pointer; text-decoration:none; display:inline-block; }
        .cf { padding:12px 18px 8px; display:grid; grid-template-columns:1fr 1fr; gap:9px; }
        .fi { display:flex; flex-direction:column; }
        .fl { font-size:9px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:2px; }
        .fv { font-family:var(--mono); font-size:12px; font-weight:700; }
        .fv.g { color:var(--green); } .fv.r { color:var(--red); }
        .cn { padding:9px 18px 14px; border-top:1.5px dashed var(--border); display:flex; justify-content:space-between; align-items:center; margin-top:4px; }
        .cn-lbl { font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; }
        .cn-val { font-family:var(--mono); font-size:18px; font-weight:800; }
        .cn-val.pos { color:var(--green); } .cn-val.neg { color:var(--red); }

        .overlay { position:fixed; inset:0; z-index:40; display:none; background:rgba(6,28,26,.55); backdrop-filter:blur(5px); align-items:flex-end; justify-content:center; }
        .overlay.show { display:flex; }
        .sheet { background:white; width:100%; max-width:480px; border-radius:26px 26px 0 0; display:flex; flex-direction:column; max-height:94vh; box-shadow:0 -12px 50px rgba(0,0,0,.2); margin:0 auto; }
        .handle { width:42px; height:4px; background:#d1d5db; border-radius:4px; margin:12px auto 4px; flex-shrink:0; }
        .sheet-body { overflow-y:auto; padding:8px 20px 20px; flex:1; }
        .sheet-close { width:100%; padding:16px; background:#f0f6f5; font-weight:700; color:var(--muted); border:none; cursor:pointer; font-family:'Plus Jakarta Sans',sans-serif; font-size:14px; flex-shrink:0; }
        .sheet-close:active { background:#daeae8; }

        .d-name { font-size:22px; font-weight:800; margin-bottom:6px; }
        .d-badges { display:flex; gap:7px; flex-wrap:wrap; margin-bottom:18px; align-items:center; }
        .db { font-size:10px; font-weight:700; padding:4px 12px; border-radius:20px; text-transform:uppercase; }
        .db-t { background:var(--accent-light); color:var(--accent); }
        .db-n { background:var(--amber-bg); color:var(--amber); }
        .db-b { background:#fef2f2; color:var(--red); }

        .sec { background:#f7fcfb; border-radius:18px; padding:16px; margin-bottom:14px; border:1px solid #ddecea; }
        .sec-ttl { font-size:9px; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:12px; display:flex; justify-content:space-between; align-items:center; }

        /* Info rows — editable */
        .irow { display:flex; justify-content:space-between; align-items:center; padding:7px 0; border-bottom:1px solid #e5f0ef; }
        .irow:last-child { border-bottom:none; }
        .irow .lbl { color:var(--muted); font-weight:600; font-size:12px; min-width:90px; }
        .irow .val-side { display:flex; align-items:center; gap:6px; flex:1; justify-content:flex-end; flex-wrap:wrap; }
        .irow .val { font-family:var(--mono); font-weight:700; font-size:12px; text-align:right; word-break:break-all; }
        .irow .val.mobile-val { font-size:12px; }
        .info-edit-btn { background:var(--accent-light); color:var(--accent); border:1px solid #b2deda; border-radius:7px; padding:3px 8px; font-size:10px; font-weight:700; cursor:pointer; font-family:'Plus Jakarta Sans',sans-serif; white-space:nowrap; flex-shrink:0; }
        .info-edit-btn:active { background:#ccefec; }
        .info-iedit { display:none; padding:8px 0 4px; }
        .info-iedit.open { display:block; }
        .info-iedit-row { display:flex; gap:6px; }
        .info-iedit input, .info-iedit select, .info-iedit textarea { flex:1; padding:8px 10px; border:1.5px solid var(--border); border-radius:10px; font-size:13px; font-family:'Plus Jakarta Sans',sans-serif; outline:none; color:var(--text); background:white; }
        .info-iedit input:focus, .info-iedit select:focus, .info-iedit textarea:focus { border-color:var(--accent); }
        .btn-si { background:var(--accent); color:white; border:none; border-radius:10px; padding:8px 14px; font-weight:700; font-size:12px; cursor:pointer; font-family:'Plus Jakarta Sans',sans-serif; white-space:nowrap; }
        .btn-ci { background:#f0f5f4; color:var(--muted); border:none; border-radius:10px; padding:8px 12px; font-weight:700; font-size:12px; cursor:pointer; font-family:'Plus Jakarta Sans',sans-serif; }

        /* Finance rows */
        .frow { padding:8px 0; border-bottom:1px solid #e5f0ef; }
        .frow:last-of-type { border-bottom:none; }
        .frow-top { display:flex; justify-content:space-between; align-items:center; }
        .frow .lbl { color:var(--muted); font-weight:600; font-size:12px; }
        .frow .val { font-family:var(--mono); font-weight:700; font-size:13px; }
        .frow .val.r { color:var(--red); } .frow .val.g { color:var(--green); }
        .edit-btn { background:var(--accent-light); color:var(--accent); border:1px solid #b2deda; border-radius:8px; padding:4px 10px; font-size:10px; font-weight:700; cursor:pointer; font-family:'Plus Jakarta Sans',sans-serif; }
        .fedit { display:none; margin-top:8px; }
        .fedit.open { display:block; }
        .fedit-row { display:flex; gap:6px; align-items:center; }
        .fedit input[type=number] { flex:1; padding:8px 10px; border:1.5px solid var(--border); border-radius:10px; font-size:13px; font-family:'Plus Jakarta Sans',sans-serif; outline:none; }
        .fedit input[type=number]:focus { border-color:var(--accent); }
        .fedit-note { width:100%; padding:7px 10px; border:1.5px solid var(--border); border-radius:10px; font-size:12px; font-family:'Plus Jakarta Sans',sans-serif; outline:none; margin-top:6px; }
        .fedit-note:focus { border-color:var(--accent); }
        .div-dash { border:none; border-top:2px dashed var(--border); margin:10px 0; }
        .net-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0 2px; }
        .net-row .lbl { font-size:14px; font-weight:800; color:var(--text); }
        .net-row .val { font-family:var(--mono); font-size:22px; font-weight:800; }
        .net-row .val.pos { color:var(--green); } .net-row .val.neg { color:var(--red); }

        .hist-entry { background:white; border:1px solid var(--border); border-radius:12px; padding:10px 13px; margin-top:8px; display:flex; justify-content:space-between; align-items:center; }
        .hist-month { font-family:var(--mono); font-size:11px; font-weight:700; color:var(--muted); }
        .hist-net { font-family:var(--mono); font-size:14px; font-weight:800; }
        .hist-net.pos { color:var(--green); } .hist-net.neg { color:var(--red); }

        .log-card { background:white; border:1px solid var(--border); border-radius:12px; padding:10px 13px; margin-top:8px; }
        .log-top { display:flex; justify-content:space-between; margin-bottom:5px; align-items:center; }
        .log-field { font-size:10px; font-weight:800; color:var(--accent); text-transform:uppercase; letter-spacing:.5px; }
        .log-time { font-family:var(--mono); font-size:10px; color:var(--muted); }
        .log-vals { font-size:12px; font-weight:700; }
        .log-vals .old { color:var(--red); } .log-vals .arrow { color:var(--muted); margin:0 5px; } .log-vals .new { color:var(--green); }
        .log-note { font-size:11px; color:var(--muted); margin-top:3px; font-style:italic; }
        .log-empty { color:var(--muted); font-size:12px; text-align:center; padding:14px 0; }

        .admin-body { overflow-y:auto; padding:8px 20px 20px; flex:1; }
        .adm-hdr { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; padding-top:4px; }
        .adm-hdr h2 { font-size:21px; font-weight:800; }
        .adm-hdr .x-btn { background:#f0f6f5; border:none; width:34px; height:34px; border-radius:10px; cursor:pointer; font-size:17px; color:var(--muted); }
        .tool-row { display:flex; gap:8px; margin-bottom:18px; flex-wrap:wrap; }
        .tool-btn { flex:1; min-width:70px; padding:11px 6px; border:none; border-radius:12px; font-weight:700; font-size:11px; text-transform:uppercase; cursor:pointer; font-family:'Plus Jakarta Sans',sans-serif; letter-spacing:.4px; }
        .tb-teal { background:var(--accent); color:white; }
        .tb-dark { background:#374151; color:white; }
        .tb-green { background:var(--green); color:white; }
        .slbl { font-size:9.5px; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:.9px; margin-bottom:10px; margin-top:16px; display:block; }
        .inp { width:100%; padding:12px 14px; background:#f5fbfa; border:1.5px solid var(--border); border-radius:12px; font-size:14px; font-family:'Plus Jakarta Sans',sans-serif; outline:none; margin-bottom:8px; color:var(--text); transition:border-color .15s; }
        .inp:focus { border-color:var(--accent); }
        .igrid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
        .main-save { width:100%; background:var(--accent); color:white; padding:15px; border-radius:16px; font-weight:800; font-size:15px; border:none; cursor:pointer; font-family:'Plus Jakarta Sans',sans-serif; margin-top:10px; box-shadow:0 4px 16px rgba(13,148,136,.28); }
        .main-save:active { background:var(--accent-dark); }
        .atabs { display:flex; border-bottom:2px solid #e2efed; margin-bottom:4px; }
        .atab { flex:1; padding:10px 4px; background:none; border:none; font-family:'Plus Jakarta Sans',sans-serif; font-size:11px; font-weight:700; color:var(--muted); cursor:pointer; border-bottom:3px solid transparent; margin-bottom:-2px; text-transform:uppercase; letter-spacing:.3px; }
        .atab.on { color:var(--accent); border-bottom-color:var(--accent); }
        .apane { display:none; padding-top:10px; }
        .apane.on { display:block; }
        .del-wrap { text-align:center; padding:6px 0 2px; }
        .del-btn { color:var(--red); font-weight:700; font-size:13px; background:none; border:none; cursor:pointer; font-family:'Plus Jakarta Sans',sans-serif; }
        .snap-pill { background:var(--accent); color:white; font-size:9px; font-weight:800; padding:3px 10px; border-radius:20px; font-family:var(--mono); letter-spacing:.5px; }
    </style>
</head>
<body>

<nav>
    <div class="nav-r1">
        <div>
            <h1>⬡ ODC STAFF</h1>
            <div class="nav-credit">Made by <b>Ali</b> &amp; <b>Claude</b></div>
        </div>
        <button class="menu-btn" onclick="checkPassword()">⋮</button>
    </div>
</nav>

<div class="top-bar">
    <input type="text" id="searchInput" onkeyup="doSearch()" placeholder="🔍  Search name, iqama, mobile...">
    <div class="filter-row">
        <select id="filterStatus" onchange="doSearch()">
            <option value="">All Status</option>
            <option value="active">Active</option>
            <option value="leave">On Leave</option>
            <option value="terminated">Terminated</option>
        </select>
        <select id="filterWork" onchange="doSearch()">
            <option value="">All Roles</option>
        </select>
        <button class="sort-btn" onclick="cycleSort()">Sort: <span id="sortLabel">Name</span></button>
    </div>
</div>

<div class="month-banner">
    <label>📅 Payroll Month</label>
    <input type="month" id="activeMth" onchange="onMonthChange()">
</div>

<div id="results"></div>

<!-- DETAIL MODAL -->
<div id="detailOverlay" class="overlay">
    <div class="sheet">
        <div class="handle"></div>
        <div class="sheet-body" id="detailBody"></div>
        <div id="delWrap" class="del-wrap" style="display:none">
            <button class="del-btn" onclick="deleteEmployee()">🗑 Delete Record</button>
        </div>
        <button class="sheet-close" onclick="closeModal('detailOverlay')">Close</button>
    </div>
</div>

<!-- ADMIN MODAL -->
<div id="adminOverlay" class="overlay">
    <div class="sheet">
        <div class="handle"></div>
        <div class="admin-body">
            <div class="adm-hdr">
                <h2>Admin Panel</h2>
                <button class="x-btn" onclick="closeModal('adminOverlay')">✕</button>
            </div>
            <div class="tool-row">
                <button class="tool-btn tb-teal"  onclick="exportBackup()">📋 Backup</button>
                <button class="tool-btn tb-dark"  onclick="importBackup()">♻️ Restore</button>
                <button class="tool-btn tb-green" onclick="downloadCSV()">⬇️ CSV</button>
            </div>
            <div class="atabs">
                <button class="atab on" onclick="swTab('tInfo',this)">Info</button>
                <button class="atab"    onclick="swTab('tFin',this)">Finance</button>
                <button class="atab"    onclick="swTab('tDocs',this)">Docs</button>
            </div>
            <div id="tInfo" class="apane on">
                <span class="slbl">Personal Info</span>
                <input class="inp" id="nName"   placeholder="Full Name">
                <input class="inp" id="nMobile" placeholder="Mobile Number">
                <input class="inp" id="nNat"    placeholder="Nationality">
                <input class="inp" id="nIqama"  placeholder="Iqama Number">
                <input class="inp" id="nWork"   placeholder="Work Type (Driver, etc.)">
                <select class="inp" id="nStatus">
                    <option value="active">Active</option>
                    <option value="leave">On Leave</option>
                    <option value="terminated">Terminated</option>
                </select>
                <input class="inp" id="nBlood"  placeholder="Blood Type">
                <input class="inp" id="nAcc"    placeholder="Accommodation">
                <input class="inp" id="nLic"    placeholder="License Number">
                <input class="inp" id="nVeh"    placeholder="Vehicle Info">
                <div class="igrid">
                    <input class="inp" id="nJoin"  placeholder="Joining Date">
                    <input class="inp" id="nLeave" placeholder="Leaving Date">
                </div>
                <span class="slbl">Notes</span>
                <textarea class="inp" id="nNotes" placeholder="Visa expiry, company phone, etc." rows="3" style="resize:vertical"></textarea>
            </div>
            <div id="tFin" class="apane">
                <span class="slbl">Salary</span>
                <input class="inp" id="nSalary"       placeholder="Total Salary (SAR)" type="number">
                <span class="slbl">Deductions</span>
                <input class="inp" id="nAdvance"      placeholder="Advance (SAR)" type="number">
                <input class="inp" id="nTrafficFines" placeholder="Traffic Fines (SAR)" type="number">
                <input class="inp" id="nFines"        placeholder="Fines (SAR)" type="number">
                <input class="inp" id="nFinesDlc"     placeholder="Fines by DLC (SAR)" type="number">
            </div>
            <div id="tDocs" class="apane">
                <span class="slbl">Document Photo URLs</span>
                <input class="inp" id="nIqamaPic" placeholder="Iqama Photo URL">
                <input class="inp" id="nLicPic"   placeholder="License Photo URL">
            </div>
            <button class="main-save" onclick="saveEmployee()">Save Staff Member</button>
        </div>
    </div>
</div>

<script>
const STORE = 'odcV7';
let employees = [];
try { employees = JSON.parse(localStorage.getItem(STORE)) || []; } catch(e) { employees = []; }
let isAdmin = false;
let currentIdx = null;
let sortMode = 0;

function persist() { localStorage.setItem(STORE, JSON.stringify(employees)); }
function fmt(n) { return (parseFloat(n)||0).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0}); }
function calcNet(e, snap) {
    const s = snap || e;
    return (parseFloat(s.salary)||0) - (parseFloat(s.advance)||0) - (parseFloat(s.trafficFines)||0) - (parseFloat(s.fines)||0) - (parseFloat(s.finesDlc)||0);
}
function nowStr() {
    const d = new Date();
    return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) + ' ' + d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

const FLABELS = { salary:'Salary', advance:'Advance', trafficFines:'Traffic Fines', fines:'Fines', finesDlc:'Fines by DLC' };
const STATUS_HTML = {
    active:'<span class="status-badge s-active">Active</span>',
    leave:'<span class="status-badge s-leave">On Leave</span>',
    terminated:'<span class="status-badge s-term">Terminated</span>'
};

/* MONTH */
function getActiveMth() { return document.getElementById('activeMth').value; }
function initMonth() {
    const d = new Date();
    document.getElementById('activeMth').value = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
}

/* When month changes: snapshot current values for new month BUT reset fines/penalties to 0 */
function onMonthChange() {
    const mth = getActiveMth();
    employees.forEach(e => {
        if (!e.snapshots) e.snapshots = {};
        if (!e.snapshots[mth]) {
            // New month: carry salary & advance, but CLEAR fines/penalties
            e.snapshots[mth] = {
                salary:       e.salary,
                advance:      e.advance,
                trafficFines: 0,
                fines:        0,
                finesDlc:     0
            };
        }
    });
    persist();
    render();
}

/* SNAPSHOT */
function getSnap(e, mth) {
    if (!e.snapshots) e.snapshots = {};
    if (!e.snapshots[mth]) {
        e.snapshots[mth] = {
            salary: e.salary,
            advance: e.advance,
            trafficFines: e.trafficFines,
            fines: e.fines,
            finesDlc: e.finesDlc
        };
    }
    return e.snapshots[mth];
}

/* ROLE FILTER */
function populateRoleFilter() {
    const sel = document.getElementById('filterWork');
    const cur = sel.value;
    const roles = [...new Set(employees.map(e=>e.work).filter(Boolean))].sort();
    sel.innerHTML = '<option value="">All Roles</option>' + roles.map(r=>`<option value="${r}"${r===cur?' selected':''}>${r}</option>`).join('');
}

/* RENDER CARDS */
function render() {
    populateRoleFilter();
    const mth    = getActiveMth();
    const q      = document.getElementById('searchInput').value.toUpperCase();
    const stFilt = document.getElementById('filterStatus').value;
    const wkFilt = document.getElementById('filterWork').value;

    let list = employees.map((e,i)=>({e,i})).filter(({e})=>{
        const txt = [e.name,e.iqama,e.mobile,e.work,e.nat].join(' ').toUpperCase();
        if (q && !txt.includes(q)) return false;
        if (stFilt && (e.status||'active') !== stFilt) return false;
        if (wkFilt && e.work !== wkFilt) return false;
        return true;
    });

    if (sortMode===1) list.sort((a,b)=>calcNet(a.e,getSnap(a.e,mth))-calcNet(b.e,getSnap(b.e,mth)));
    else if (sortMode===2) list.sort((a,b)=>calcNet(b.e,getSnap(b.e,mth))-calcNet(a.e,getSnap(a.e,mth)));
    else list.sort((a,b)=>a.e.name.localeCompare(b.e.name));

    const c = document.getElementById('results');
    c.innerHTML = '';
    if (!list.length) { c.innerHTML = '<div class="empty">No records found.<br>Tap ⋮ to add staff.</div>'; return; }

    list.forEach(({e,i})=>{
        const snap = getSnap(e,mth);
        const net  = calcNet(e,snap);
        const nc   = net>=0?'pos':'neg';
        const adv  = parseFloat(snap.advance)||0;
        const tf   = parseFloat(snap.trafficFines)||0;
        const fn   = parseFloat(snap.fines)||0;
        const fd   = parseFloat(snap.finesDlc)||0;
        const st   = e.status||'active';
        c.innerHTML += `
        <div class="emp-card" onclick="showDetail(${i})">
            <div class="ch">
                <div class="ch-top"><div class="ch-name">${e.name}</div>${STATUS_HTML[st]||''}</div>
                <div class="ch-meta">
                    ${e.work?`<span class="bw">${e.work}</span>`:''}
                    ${e.nat ?`<span class="bn">${e.nat}</span>` :''}
                </div>
                ${e.mobile?`<div class="ch-mob">📱 ${e.mobile}
                    <a class="call-btn" href="tel:${e.mobile}" onclick="event.stopPropagation()">📞 Call</a>
                    <a class="wa-btn"   href="https://wa.me/${e.mobile.replace(/\D/g,'')}" target="_blank" onclick="event.stopPropagation()">💬 WhatsApp</a>
                </div>`:''}
            </div>
            <div class="cf">
                <div class="fi"><span class="fl">Total Salary</span><span class="fv g">SAR ${fmt(snap.salary)}</span></div>
                <div class="fi"><span class="fl">Advance</span><span class="fv r">${adv?'−'+fmt(adv):'—'}</span></div>
                <div class="fi"><span class="fl">Traffic Fines</span><span class="fv r">${tf?'−'+fmt(tf):'—'}</span></div>
                <div class="fi"><span class="fl">Fines</span><span class="fv r">${fn?'−'+fmt(fn):'—'}</span></div>
                <div class="fi"><span class="fl">Fines by DLC</span><span class="fv r">${fd?'−'+fmt(fd):'—'}</span></div>
                <div class="fi"></div>
            </div>
            <div class="cn">
                <span class="cn-lbl">Net Salary</span>
                <span class="cn-val ${nc}">SAR ${fmt(net)}</span>
            </div>
        </div>`;
    });
}

const SORT_LABELS = ['Name','Net ↑','Net ↓'];
function cycleSort() { sortMode=(sortMode+1)%3; document.getElementById('sortLabel').textContent=SORT_LABELS[sortMode]; render(); }
function doSearch() { render(); }

/* DETAIL */
function showDetail(idx) {
    currentIdx = idx;
    renderDetail();
    document.getElementById('detailOverlay').classList.add('show');
    document.getElementById('delWrap').style.display = isAdmin?'block':'none';
    document.getElementById('detailBody').scrollTop = 0;
}

function renderDetail() {
    const e    = employees[currentIdx];
    const mth  = getActiveMth();
    const snap = getSnap(e, mth);
    const net  = calcNet(e, snap);
    const nc   = net>=0?'pos':'neg';
    const adv  = parseFloat(snap.advance)||0;
    const tf   = parseFloat(snap.trafficFines)||0;
    const fn   = parseFloat(snap.fines)||0;
    const fd   = parseFloat(snap.finesDlc)||0;
    const tot  = adv+tf+fn+fd;
    const log  = (e.log||[]).slice().reverse();
    const st   = e.status||'active';
    const [yr,mo] = mth.split('-');
    const mthLabel = new Date(yr,mo-1).toLocaleString('en-US',{month:'long',year:'numeric'});

    /* info row with inline edit */
    function infoRow(field, label, value, inputType='text', options=null) {
        if (!isAdmin && !value) return '';
        const editBtn = isAdmin ? `<button class="info-edit-btn" onclick="openInfoEdit('${field}')">✏️</button>` : '';
        const displayVal = value || '<span style="color:#ccc">—</span>';

        let inputHtml = '';
        if (options) {
            inputHtml = `<select id="iiv-${field}">${options.map(o=>`<option value="${o.v}"${o.v===value?' selected':''}>${o.l}</option>`).join('')}</select>`;
        } else if (inputType === 'textarea') {
            inputHtml = `<textarea id="iiv-${field}" rows="3" style="resize:vertical">${value||''}</textarea>`;
        } else {
            inputHtml = `<input type="${inputType}" id="iiv-${field}" value="${value||''}">`;
        }

        return `
        <div class="irow">
            <span class="lbl">${label}</span>
            <div class="val-side">
                <span class="val">${displayVal}</span>
                ${editBtn}
            </div>
        </div>
        ${isAdmin ? `
        <div id="iie-${field}" class="info-iedit">
            <div class="info-iedit-row">
                ${inputHtml}
                <button class="btn-si" onclick="saveInfoField('${field}')">Save</button>
                <button class="btn-ci" onclick="closeInfoEdit('${field}')">✕</button>
            </div>
        </div>` : ''}`;
    }

    /* mobile row special — has call + wa buttons */
    function mobileRow() {
        const value = e.mobile || '';
        const editBtn = isAdmin ? `<button class="info-edit-btn" onclick="openInfoEdit('mobile')">✏️</button>` : '';
        const callBtns = value ? `<a class="call-btn" href="tel:${value}">📞 Call</a><a class="wa-btn" href="https://wa.me/${value.replace(/\D/g,'')}" target="_blank">💬 WA</a>` : '';
        return `
        <div class="irow">
            <span class="lbl">Mobile</span>
            <div class="val-side">
                <span class="val mobile-val">${value||'<span style="color:#ccc">—</span>'}</span>
                ${callBtns}
                ${editBtn}
            </div>
        </div>
        ${isAdmin ? `
        <div id="iie-mobile" class="info-iedit">
            <div class="info-iedit-row">
                <input type="tel" id="iiv-mobile" value="${value}">
                <button class="btn-si" onclick="saveInfoField('mobile')">Save</button>
                <button class="btn-ci" onclick="closeInfoEdit('mobile')">✕</button>
            </div>
        </div>` : ''}`;
    }

    /* finance row with edit */
    function finRow(field, label, valClass, displayVal) {
        const eb = isAdmin ? `<button class="edit-btn" onclick="openFinEdit('${field}')">✏️ Edit</button>` : '';
        return `
        <div class="frow">
            <div class="frow-top">
                <span class="lbl">${label}</span>
                <div style="display:flex;align-items:center;gap:7px">
                    <span class="val ${valClass}">${displayVal}</span>${eb}
                </div>
            </div>
            <div id="fe-${field}" class="fedit">
                <div class="fedit-row">
                    <input type="number" id="fv-${field}" placeholder="New amount (SAR)" value="${snap[field]||''}">
                    <button class="btn-si" onclick="saveFinField('${field}')">Save</button>
                    <button class="btn-ci" onclick="closeFinEdit('${field}')">✕</button>
                </div>
                <input class="fedit-note" id="fn-${field}" placeholder="Note / reason (optional)">
            </div>
        </div>`;
    }

    document.getElementById('detailBody').innerHTML = `
        <div class="d-name">${e.name}</div>
        <div class="d-badges">
            ${STATUS_HTML[st]||''}
            ${e.work ?`<span class="db db-t">${e.work}</span>`:''}
            ${e.nat  ?`<span class="db db-n">${e.nat}</span>` :''}
            ${e.blood?`<span class="db db-b">🩸 ${e.blood}</span>`:''}
        </div>

        <div class="sec">
            <div class="sec-ttl">Personal Info</div>
            ${infoRow('name',   'Name',          e.name)}
            ${mobileRow()}
            ${infoRow('nat',    'Nationality',   e.nat)}
            ${infoRow('iqama',  'Iqama',         e.iqama)}
            ${infoRow('work',   'Work Type',     e.work)}
            ${infoRow('status', 'Status',        e.status||'active', 'text', [
                {v:'active',l:'Active'},{v:'leave',l:'On Leave'},{v:'terminated',l:'Terminated'}
            ])}
            ${infoRow('blood',  'Blood Type',    e.blood)}
            ${infoRow('acc',    'Accommodation', e.acc)}
            ${infoRow('lic',    'License',       e.lic)}
            ${infoRow('veh',    'Vehicle',       e.veh)}
            ${infoRow('join',   'Joined',        e.join)}
            ${infoRow('leave',  'Leaving',       e.leave)}
            ${infoRow('notes',  'Notes',         e.notes, 'textarea')}
        </div>

        <div class="sec">
            <div class="sec-ttl">
                Finance — <span class="snap-pill">${mthLabel}</span>
                ${isAdmin?'<span style="font-size:9px;color:var(--accent);font-style:italic;text-transform:none;font-weight:600">✏️ tap to edit</span>':''}
            </div>
            ${finRow('salary',       'Total Salary',  'g', `SAR ${fmt(snap.salary)}`)}
            <hr class="div-dash">
            ${finRow('advance',      'Advance',       'r', adv?`− SAR ${fmt(adv)}`:'—')}
            ${finRow('trafficFines', 'Traffic Fines', 'r', tf ?`− SAR ${fmt(tf)}`:'—')}
            ${finRow('fines',        'Fines',         'r', fn ?`− SAR ${fmt(fn)}`:'—')}
            ${finRow('finesDlc',     'Fines by DLC',  'r', fd ?`− SAR ${fmt(fd)}`:'—')}
            <hr class="div-dash">
            <div style="display:flex;justify-content:space-between;padding:6px 0 2px">
                <span style="font-weight:700;font-size:13px">Total Deductions</span>
                <span style="font-family:var(--mono);font-weight:700;color:var(--red)">− SAR ${fmt(tot)}</span>
            </div>
            <div class="net-row">
                <span class="lbl">Net Salary</span>
                <span class="val ${nc}">SAR ${fmt(net)}</span>
            </div>
        </div>

        <div class="sec">
            <div class="sec-ttl">Salary History</div>
            ${buildHistory(e)}
        </div>

        <div class="sec">
            <div class="sec-ttl">Change Log</div>
            ${log.length ? log.map(l=>`
                <div class="log-card">
                    <div class="log-top">
                        <span class="log-field">${l.field}</span>
                        <span class="log-time">${l.time}</span>
                    </div>
                    <div class="log-vals">
                        <span class="old">SAR ${fmt(l.oldVal)}</span>
                        <span class="arrow">→</span>
                        <span class="new">SAR ${fmt(l.newVal)}</span>
                    </div>
                    ${l.note?`<div class="log-note">📝 ${l.note}</div>`:''}
                </div>`).join('')
            :'<div class="log-empty">No changes recorded yet.</div>'}
        </div>

        ${(e.iqamaPic||e.licPic)?`
        <div class="sec">
            <div class="sec-ttl">Documents</div>
            ${e.iqamaPic?`<p style="font-size:10px;font-weight:700;color:var(--muted);margin-bottom:6px;text-transform:uppercase">Iqama Photo</p><img src="${e.iqamaPic}" style="width:100%;border-radius:12px;border:1.5px solid var(--border);margin-bottom:12px">`:''}
            ${e.licPic  ?`<p style="font-size:10px;font-weight:700;color:var(--muted);margin-bottom:6px;text-transform:uppercase">License Photo</p><img src="${e.licPic}" style="width:100%;border-radius:12px;border:1.5px solid var(--border)">`:''}
        </div>` : ''}
    `;
}

/* INFO FIELD EDIT */
function openInfoEdit(field) {
    document.querySelectorAll('.info-iedit').forEach(el=>el.classList.remove('open'));
    const el = document.getElementById('iie-'+field);
    if (el) { el.classList.add('open'); const inp = document.getElementById('iiv-'+field); if(inp) inp.focus(); }
}
function closeInfoEdit(field) {
    const el = document.getElementById('iie-'+field);
    if (el) el.classList.remove('open');
}
function saveInfoField(field) {
    const emp = employees[currentIdx];
    const el  = document.getElementById('iiv-'+field);
    if (!el) return;
    emp[field] = el.tagName==='SELECT' ? el.value : el.value.trim();
    persist(); render(); renderDetail();
}

/* FINANCE FIELD EDIT */
function openFinEdit(field) {
    document.querySelectorAll('.fedit').forEach(el=>el.classList.remove('open'));
    const el = document.getElementById('fe-'+field);
    if (el) { el.classList.add('open'); document.getElementById('fv-'+field).focus(); }
}
function closeFinEdit(field) {
    const el = document.getElementById('fe-'+field);
    if (el) el.classList.remove('open');
}
function saveFinField(field) {
    const emp    = employees[currentIdx];
    const mth    = getActiveMth();
    const snap   = getSnap(emp, mth);
    const oldVal = parseFloat(snap[field])||0;
    const newVal = parseFloat(document.getElementById('fv-'+field).value)||0;
    const note   = (document.getElementById('fn-'+field).value||'').trim();
    if (!emp.log) emp.log = [];
    emp.log.push({ field:FLABELS[field]||field, oldVal, newVal, note, time:nowStr(), month:mth });
    snap[field] = newVal;
    emp[field]  = newVal;
    persist(); render(); renderDetail();
}

/* SALARY HISTORY */
function buildHistory(e) {
    if (!e.snapshots || !Object.keys(e.snapshots).length) return '<div class="log-empty">No history yet.</div>';
    const keys = Object.keys(e.snapshots).sort().reverse().slice(0,12);
    return keys.map(k=>{
        const s = e.snapshots[k];
        const net = calcNet(e,s);
        const nc = net>=0?'pos':'neg';
        const [yr,mo] = k.split('-');
        const label = new Date(yr,mo-1).toLocaleString('en-US',{month:'short',year:'numeric'});
        return `<div class="hist-entry"><span class="hist-month">${label}</span><span class="hist-net ${nc}">SAR ${fmt(net)}</span></div>`;
    }).join('');
}

/* AUTH */
function checkPassword() {
    if (prompt("Admin Password:") === "Aa@102030") {
        isAdmin = true;
        document.getElementById('adminOverlay').classList.add('show');
    } else { alert("Access Denied"); }
}

/* ADD EMPLOYEE */
function swTab(id, btn) {
    document.querySelectorAll('.apane').forEach(p=>p.classList.remove('on'));
    document.querySelectorAll('.atab').forEach(b=>b.classList.remove('on'));
    document.getElementById(id).classList.add('on');
    btn.classList.add('on');
}
function saveEmployee() {
    const name = document.getElementById('nName').value.trim();
    if (!name) return alert("Name is required!");
    const mth          = getActiveMth();
    const salary       = document.getElementById('nSalary').value;
    const advance      = document.getElementById('nAdvance').value;
    const trafficFines = document.getElementById('nTrafficFines').value;
    const fines        = document.getElementById('nFines').value;
    const finesDlc     = document.getElementById('nFinesDlc').value;
    const emp = {
        name, salary, advance, trafficFines, fines, finesDlc,
        mobile:  document.getElementById('nMobile').value,
        nat:     document.getElementById('nNat').value,
        iqama:   document.getElementById('nIqama').value,
        lic:     document.getElementById('nLic').value,
        veh:     document.getElementById('nVeh').value,
        work:    document.getElementById('nWork').value,
        status:  document.getElementById('nStatus').value,
        blood:   document.getElementById('nBlood').value,
        acc:     document.getElementById('nAcc').value,
        join:    document.getElementById('nJoin').value,
        leave:   document.getElementById('nLeave').value,
        notes:   document.getElementById('nNotes').value,
        iqamaPic:document.getElementById('nIqamaPic').value,
        licPic:  document.getElementById('nLicPic').value,
        log: [],
        snapshots: { [mth]: { salary, advance, trafficFines, fines, finesDlc } }
    };
    employees.push(emp);
    persist(); render();
    closeModal('adminOverlay');
    document.querySelectorAll('.inp').forEach(i=>i.value='');
    document.getElementById('nStatus').value='active';
    swTab('tInfo', document.querySelector('.atab'));
}

/* DELETE */
function deleteEmployee() {
    if (!isAdmin) return;
    if (confirm("Delete this record permanently?")) {
        employees.splice(currentIdx,1);
        persist(); render();
        closeModal('detailOverlay');
    }
}

/* BACKUP */
function exportBackup() { navigator.clipboard.writeText(JSON.stringify(employees)); alert("Backup copied!"); }
function importBackup() {
    const s = prompt("Paste backup code:");
    if (!s) return;
    try { employees=JSON.parse(s); persist(); render(); alert("Restored!"); }
    catch(e) { alert("Invalid backup code."); }
}

/* CSV */
function downloadCSV() {
    const mth = getActiveMth();
    const headers = ['Name','Status','Mobile','Nationality','Iqama','Work','Blood','Accommodation','License','Vehicle','Joining','Leaving','Notes','Salary','Advance','Traffic Fines','Fines','Fines by DLC','Net Salary','Month'];
    const rows = employees.map(e=>{
        const snap = getSnap(e,mth);
        return [e.name,e.status||'active',e.mobile,e.nat,e.iqama,e.work,e.blood,e.acc,e.lic,e.veh,e.join,e.leave,e.notes,
            parseFloat(snap.salary)||0, parseFloat(snap.advance)||0, parseFloat(snap.trafficFines)||0,
            parseFloat(snap.fines)||0, parseFloat(snap.finesDlc)||0, calcNet(e,snap), mth
        ].map(v=>`"${String(v||'').replace(/"/g,'""')}"`);
    });
    const csv = [headers.join(','),...rows.map(r=>r.join(','))].join('\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
    a.download = `ODC_Staff_${mth}.csv`; a.click();
}

initMonth();
render();
</script>
