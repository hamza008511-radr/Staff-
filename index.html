<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ODC STAFF</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --accent:      #0d9488;
            --accent-dark: #0b7a70;
            --accent-light:#f0fdfa;
            --bg:          #f4f8f7;
            --card:        #ffffff;
            --text:        #0d2b28;
            --muted:       #6b8e8b;
            --border:      #d1e6e3;
            --green:       #059669;
            --red:         #dc2626;
            --amber:       #d97706;
            --amber-bg:    #fffbeb;
            --wa:          #25d366;
            --mono:        'IBM Plex Mono', monospace;
        }
        body { background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; color: var(--text); min-height: 100vh; }

        nav { background: linear-gradient(135deg,#0d9488,#0c6e68); color:white; padding:14px 18px 9px; position:sticky; top:0; z-index:20; box-shadow:0 4px 24px rgba(13,148,136,.28); }
        .nav-r1 { display:flex; justify-content:space-between; align-items:center; }
        nav h1 { font-family:var(--mono); font-size:19px; font-weight:700; letter-spacing:-.4px; }
        .nav-credit { font-size:9.5px; font-weight:600; opacity:.65; letter-spacing:.9px; text-transform:uppercase; margin-top:3px; }
        .nav-credit b { opacity:1; font-style:italic; }
        .menu-btn { background:rgba(255,255,255,.18); border:none; color:white; width:38px; height:38px; border-radius:12px; cursor:pointer; font-size:22px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
        .menu-btn:active { background:rgba(255,255,255,.3); }

        .top-bar { background:linear-gradient(135deg,#0d9488,#0c6e68); padding:10px 16px 30px; display:flex; flex-direction:column; gap:8px; }
        .top-bar input[type=text] { width:100%; padding:13px 18px; border-radius:16px; border:none; font-size:15px; outline:none; font-family:'Plus Jakarta Sans',sans-serif; box-shadow:0 8px 24px rgba(0,0,0,.14); color:var(--text); }
        .top-bar input::placeholder { color:#9fc8c5; }
        .filter-row { display:flex; gap:7px; flex-wrap:wrap; }
        .filter-row select { flex:1; min-width:110px; padding:8px 12px; border-radius:12px; border:none; font-family:'Plus Jakarta Sans',sans-serif; font-size:12px; font-weight:700; background:rgba(255,255,255,.2); color:white; outline:none; cursor:pointer; }
        .filter-row select option { color:var(--text); background:white; }
        .sort-btn { background:rgba(255,255,255,.2); border:none; color:white; border-radius:12px; padding:8px 13px; font-size:11px; font-weight:700; cursor:pointer; white-space:nowrap; font-family:'Plus Jakarta Sans',sans-serif; }

        .month-banner { margin:0 14px; margin-top:-16px; background:white; border-radius:18px; border:1.5px solid var(--border); padding:12px 16px; display:flex; justify-content:space-between; align-items:center; box-shadow:0 2px 12px rgba(13,148,136,.08); margin-bottom:4px; }
        .month-banner label { font-size:10px; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; }
        .month-banner input[type=month] { border:1.5px solid var(--border); border-radius:10px; padding:6px 10px; font-family:var(--mono); font-size:13px; font-weight:700; color:var(--text); outline:none; background:var(--accent-light); }
        .month-banner input[type=month]:focus { border-color:var(--accent); }

        #results { padding:10px 14px 14px; display:flex; flex-direction:column; gap:12px; }
        .empty { text-align:center; margin-top:52px; color:var(--muted); font-size:14px; line-height:2.2; }

        .emp-card { background:var(--card); border-radius:22px; border:1.5px solid var(--border); box-shadow:0 2px 14px rgba(13,148,136,.08); overflow:hidden; cursor:pointer; transition:transform .1s; }
        .emp-card:active { transform:scale(.985); }
        .ch { padding:15px 18px 11px; border-bottom:1px solid #e2efed; }
        .ch-top { display:flex; justify-content:space-between; align-items:flex-start; }
        .ch-name { font-size:17px; font-weight:800; line-height:1.2; }
        .status-badge { font-size:9px; font-weight:800; padding:3px 9px; border-radius:20px; text-transform:uppercase; letter-spacing:.5px; flex-shrink:0; }
        .s-active { background:#d1fae5; color:#065f46; }
        .s-leave  { background:#fef3c7; color:#92400e; }
        .s-term   { background:#fee2e2; color:#991b1b; }
        .ch-meta { display:flex; gap:7px; margin-top:5px; flex-wrap:wrap; align-items:center; }
        .bw { background:var(--accent-light); color:var(--accent); font-size:10px; font-weight:700; padding:3px 10px; border-radius:20px; text-transform:uppercase; }
        .bn { background:var(--amber-bg); color:var(--amber); font-size:10px; font-weight:700; padding:3px 10px; border-radius:20px; }
        .ch-mob { font-size:11px; color:var(--muted); font-family:var(--mono); margin-top:5px; display:flex; align-items:center; gap:6px; }
        .call-btn { background:var(--accent-light); color:var(--accent); border:none; border-radius:8px; padding:3px 10px; font-size:10px; font-weight:700; cursor:pointer; text-decoration:none; display:inline-block; }
        .wa-btn   { background:#e7fdf0; color:var(--wa); border:none; border-radius:8px; padding:3px 10px; font-size:10px; font-weight:700; cursor:pointer; text-decoration:none; display:inline-block; }
        .cf { padding:12px 18px 8px; display:grid; grid-template-columns:1fr 1fr; gap:9px; }
        .fi { display:flex; flex-direction:column; }
        .fl { font-size:9px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:2px; }
        .fv { font-family:var(--mono); font-size:12px; font-weight:700; }
        .fv.g { color:var(--green); } .fv.r { color:var(--red); }
        .cn { padding:9px 18px 14px; border-top:1.5px dashed var(--border); display:flex; justify-content:space-between; align-items:center; margin-top:4px; }
        .cn-lbl { font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; }
        .cn-val { font-family:var(--mono); font-size:18px; font-weight:800; }
        .cn-val.pos { color:var(--green); } .cn-val.neg { color:var(--red); }

        .overlay { position:fixed; inset:0; z-index:40; display:none; background:rgba(6,28,26,.55); backdrop-filter:blur(5px); align-items:flex-end; justify-content:center; }
        .overlay.show { display:flex; }
        .sheet { background:white; width:100%; max-width:480px; border-radius:26px 26px 0 0; display:flex; flex-direction:column; max-height:94vh; box-shadow:0 -12px 50px rgba(0,0,0,.2); margin:0 auto; }
        .handle { width:42px; height:4px; background:#d1d5db; border-radius:4px; margin:12px auto 4px; flex-shrink:0; }
        .sheet-body { overflow-y:auto; padding:8px 20px 20px; flex:1; }
        .sheet-close { width:100%; padding:16px; background:#f0f6f5; font-weight:700; color:var(--muted); border:none; cursor:pointer; font-family:'Plus Jakarta Sans',sans-serif; font-size:14px; flex-shrink:0; }
        .sheet-close:active { background:#daeae8; }

        .d-name { font-size:22px; font-weight:800; margin-bottom:6px; }
        .d-badges { display:flex; gap:7px; flex-wrap:wrap; margin-bottom:18px; align-items:center; }
        .db { font-size:10px; font-weight:700; padding:4px 12px; border-radius:20px; text-transform:uppercase; }
        .db-t { background:var(--accent-light); color:var(--accent); }
        .db-n { background:var(--amber-bg); color:var(--amber); }
        .db-b { background:#fef2f2; color:var(--red); }

        .sec { background:#f7fcfb; border-radius:18px; padding:16px; margin-bottom:14px; border:1px solid #ddecea; }
        .sec-ttl { font-size:9px; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:12px; display:flex; justify-content:space-between; align-items:center; }

        /* Info rows — editable */
        .irow { display:flex; justify-content:space-between; align-items:center; padding:7px 0; border-bottom:1px solid #e5f0ef; }
        .irow:last-child { border-bottom:none; }
        .irow .lbl { color:var(--muted); font-weight:600; font-size:12px; min-width:90px; }
        .irow .val-side { display:flex; align-items:center; gap:6px; flex:1; justify-content:flex-end; flex-wrap:wrap; }
        .irow .val { font-family:var(--mono); font-weight:700; font-size:12px; text-align:right; word-break:break-all; }
        .irow .val.mobile-val { font-size:12px; }
        .info-edit-btn { background:var(--accent-light); color:var(--accent); border:1px solid #b2deda; border-radius:7px; padding:3px 8px; font-size:10px; font-weight:700; cursor:pointer; font-family:'Plus Jakarta Sans',sans-serif; white-space:nowrap; flex-shrink:0; }
        .info-edit-btn:active { background:#ccefec; }
        .info-iedit { display:none; padding:8px 0 4px; }
        .info-iedit.open { display:block; }
        .info-iedit-row { display:flex; gap:6px; }
        .info-iedit input, .info-iedit select, .info-iedit textarea { flex:1; padding:8px 10px; border:1.5px solid var(--border); border-radius:10px; font-size:13px; font-family:'Plus Jakarta Sans',sans-serif; outline:none; color:var(--text); background:white; }
        .info-iedit input:focus, .info-iedit select:focus, .info-iedit textarea:focus { border-color:var(--accent); }
        .btn-si { background:var(--accent); color:white; border:none; border-radius:10px; padding:8px 14px; font-weight:700; font-size:12px; cursor:pointer; font-family:'Plus Jakarta Sans',sans-serif; white-space:nowrap; }
        .btn-ci { background:#f0f5f4; color:var(--muted); border:none; border-radius:10px; padding:8px 12px; font-weight:700; font-size:12px; cursor:pointer; font-family:'Plus Jakarta Sans',sans-serif; }

        /* Finance rows */
        .frow { padding:8px 0; border-bottom:1px solid #e5f0ef; }
        .frow:last-of-type { border-bottom:none; }
        .frow-top { display:flex; justify-content:space-between; align-items:center; }
        .frow .lbl { color:var(--muted); font-weight:600; font-size:12px; }
        .frow .val { font-family:var(--mono); font-weight:700; font-size:13px; }
        .frow .val.r { color:var(--red); } .frow .val.g { color:var(--green); }
        .edit-btn { background:var(--accent-light); color:var(--accent); border:1px solid #b2deda; border-radius:8px; padding:4px 10px; font-size:10px; font-weight:700; cursor:pointer; font-family:'Plus Jakarta Sans',sans-serif; }
        .fedit { display:none; margin-top:8px; }
        .fedit.open { display:block; }
        .fedit-row { display:flex; gap:6px; align-items:center; }
        .fedit input[type=number] { flex:1; padding:8px 10px; border:1.5px solid var(--border); border-radius:10px; font-size:13px; font-family:'Plus Jakarta Sans',sans-serif; outline:none; }
        .fedit input[type=number]:focus { border-color:var(--accent); }
        .fedit-note { width:100%; padding:7px 10px; border:1.5px solid var(--border); border-radius:10px; font-size:12px; font-family:'Plus Jakarta Sans',sans-serif; outline:none; margin-top:6px; }
        .fedit-note:focus { border-color:var(--accent); }
        .div-dash { border:none; border-top:2px dashed var(--border); margin:10px 0; }
        .net-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0 2px; }
        .net-row .lbl { font-size:14px; font-weight:800; color:var(--text); }
        .net-row .val { font-family:var(--mono); font-size:22px; font-weight:800; }
        .net-row .val.pos { color:var(--green); } .net-row .val.neg { color:var(--red); }

        .hist-entry { background:white; border:1px solid var(--border); border-radius:12px; padding:10px 13px; margin-top:8px; display:flex; justify-content:space-between; align-items:center; }
        .hist-month { font-family:var(--mono); font-size:11px; font-weight:700; color:var(--muted); }
        .hist-net { font-family:var(--mono); font-size:14px; font-weight:800; }
        .hist-net.pos { color:var(--green); } .hist-net.neg { color:var(--red); }

        .log-card { background:white; border:1px solid var(--border); border-radius:12px; padding:10px 13px; margin-top:8px; }
        .log-top { display:flex; justify-content:space-between; margin-bottom:5px; align-items:center; }
        .log-field { font-size:10px; font-weight:800; color:var(--accent); text-transform:uppercase; letter-spacing:.5px; }
        .log-time { font-family:var(--mono); font-size:10px; color:var(--muted); }
        .log-vals { font-size:12px; font-weight:700; }
        .log-vals .old { color:var(--red); } .log-vals .arrow { color:var(--muted); margin:0 5px; } .log-vals .new { color:var(--green); }
        .log-note { font-size:11px; color:var(--muted); margin-top:3px; font-style:italic; }
        .log-empty { color:var(--muted); font-size:12px; text-align:center; padding:14px 0; }

        .admin-body { overflow-y:auto; padding:8px 20px 20px; flex:1; }
        .adm-hdr { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; padding-top:4px; }
        .adm-hdr h2 { font-size:21px; font-weight:800; }
        .adm-hdr .x-btn { background:#f0f6f5; border:none; width:34px; height:34px; border-radius:10px; cursor:pointer; font-size:17px; color:var(--muted); }
        .tool-row { display:flex; gap:8px; margin-bottom:18px; flex-wrap:wrap; }
        .tool-btn { flex:1; min-width:70px; padding:11px 6px; border:none; border-radius:12px; font-weight:700; font-size:11px; text-transform:uppercase; cursor:pointer; font-family:'Plus Jakarta Sans',sans-serif; letter-spacing:.4px; }
        .tb-teal { background:var(--accent); color:white; }
        .tb-dark { background:#374151; color:white; }
        .tb-green { background:var(--green); color:white; }
        .slbl { font-size:9.5px; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:.9px; margin-bottom:10px; margin-top:16px; display:block; }
        .inp { width:100%; padding:12px 14px; background:#f5fbfa; border:1.5px solid var(--border); border-radius:12px; font-size:14px; font-family:'Plus Jakarta Sans',sans-serif; outline:none; margin-bottom:8px; color:var(--text); transition:border-color .15s; }
        .inp:focus { border-color:var(--accent); }
        .igrid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
        .main-save { width:100%; background:var(--accent); color:white; padding:15px; border-radius:16px; font-weight:800; font-size:15px; border:none; cursor:pointer; font-family:'Plus Jakarta Sans',sans-serif; margin-top:10px; box-shadow:0 4px 16px rgba(13,148,136,.28); }
        .main-save:active { background:var(--accent-dark); }
        .atabs { display:flex; border-bottom:2px solid #e2efed; margin-bottom:4px; }
        .atab { flex:1; padding:10px 4px; background:none; border:none; font-family:'Plus Jakarta Sans',sans-serif; font-size:11px; font-weight:700; color:var(--muted); cursor:pointer; border-bottom:3px solid transparent; margin-bottom:-2px; text-transform:uppercase; letter-spacing:.3px; }
        .atab.on { color:var(--accent); border-bottom-color:var(--accent); }
        .apane { display:none; padding-top:10px; }
        .apane.on { display:block; }
        .del-wrap { text-align:center; padding:6px 0 2px; }
        .del-btn { color:var(--red); font-weight:700; font-size:13px; background:none; border:none; cursor:pointer; font-family:'Plus Jakarta Sans',sans-serif; }
        .snap-pill { background:var(--accent); color:white; font-size:9px; font-weight:800; padding:3px 10px; border-radius:20px; font-family:var(--mono); letter-spacing:.5px; }

        /* Password Modal */
        .pw-overlay { position:fixed; inset:0; z-index:60; display:none; background:rgba(6,28,26,.7); backdrop-filter:blur(6px); align-items:center; justify-content:center; padding:20px; }
        .pw-overlay.show { display:flex; }
        .pw-box { background:white; border-radius:24px; padding:28px 24px 20px; width:100%; max-width:340px; box-shadow:0 20px 60px rgba(0,0,0,.25); }
        .pw-icon { font-size:36px; text-align:center; margin-bottom:10px; }
        .pw-title { font-size:18px; font-weight:800; text-align:center; margin-bottom:4px; color:var(--text); }
        .pw-sub { font-size:12px; color:var(--muted); text-align:center; margin-bottom:20px; }
        .pw-input { width:100%; padding:14px 16px; border:1.5px solid var(--border); border-radius:14px; font-size:16px; font-family:'Plus Jakarta Sans',sans-serif; outline:none; color:var(--text); background:var(--accent-light); letter-spacing:2px; }
        .pw-input:focus { border-color:var(--accent); }
        .pw-err { color:var(--red); font-size:12px; font-weight:700; text-align:center; margin-top:8px; min-height:18px; }
        .pw-btns { display:flex; gap:8px; margin-top:14px; }
        .pw-confirm { flex:2; background:var(--accent); color:white; border:none; border-radius:12px; padding:13px; font-weight:800; font-size:14px; cursor:pointer; font-family:'Plus Jakarta Sans',sans-serif; }
        .pw-confirm:active { background:var(--accent-dark); }
        .pw-cancel { flex:1; background:#f0f5f4; color:var(--muted); border:none; border-radius:12px; padding:13px; font-weight:700; font-size:14px; cursor:pointer; font-family:'Plus Jakarta Sans',sans-serif; }
    </style>
</head>
<body>

<nav>
    <div class="nav-r1">
        <div>
            <h1>⬡ ODC STAFF</h1>
            <div class="nav-credit">Made by <b>Ali</b> &amp; <b>Claude</b></div>
        </div>
        <button class="menu-btn" onclick="checkPassword()">⋮</button>
    </div>
</nav>

<div class="top-bar">
    <input type="text" id="searchInput" onkeyup="doSearch()" placeholder="🔍  Search name, iqama, mobile...">
    <div class="filter-row">
        <select id="filterStatus" onchange="doSearch()">
            <option value="">All Status</option>
            <option value="active">Active</option>
            <option value="leave">On Leave</option>
            <option value="terminated">Terminated</option>
        </select>
        <select id="filterWork" onchange="doSearch()">
            <option value="">All Roles</option>
        </select>
        <button class="sort-btn" onclick="cycleSort()">Sort: <span id="sortLabel">Name</span></button>
    </div>
</div>

<div class="month-banner">
    <label>📅 Payroll Month</label>
    <input type="month" id="activeMth" onchange="onMonthChange()">
</div>

<div id="results"></div>

<!-- DETAIL MODAL -->
<div id="detailOverlay" class="overlay">
    <div class="sheet">
        <div class="handle"></div>
        <div class="sheet-body" id="detailBody"></div>
        <div id="delWrap" class="del-wrap" style="display:none">
            <button class="del-btn" onclick="deleteEmployee()">🗑 Delete Record</button>
        </div>
        <button class="sheet-close" onclick="closeModal('detailOverlay')">Close</button>
    </div>
</div>

<!-- ADMIN MODAL -->
<div id="adminOverlay" class="overlay">
    <div class="sheet">
        <div class="handle"></div>
        <div class="admin-body">
            <div class="adm-hdr">
                <h2>Admin Panel</h2>
                <button class="x-btn" onclick="closeModal('adminOverlay')">✕</button>
            </div>
            <div class="tool-row">
                <button class="tool-btn tb-teal"  onclick="exportBackup()">📋 Backup</button>
                <button class="tool-btn tb-dark"  onclick="importBackup()">♻️ Restore</button>
                <button class="tool-btn tb-green" onclick="downloadCSV()">⬇️ CSV</button>
            </div>
            <div class="atabs">
                <button class="atab on" onclick="swTab('tInfo',this)">Info</button>
