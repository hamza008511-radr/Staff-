<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ODC STAFF</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0a1628;
  --ink2:#1e3a5f;
  --teal:#0e9f8e;
  --teal-d:#0b7a6d;
  --teal-l:#e6f9f7;
  --teal-m:#b3ece7;
  --sky:#e8f4ff;
  --bg:#f0f4f8;
  --card:#ffffff;
  --border:#dde8ef;
  --muted:#6b8da8;
  --green:#0a9e6a;
  --green-bg:#e6f7f0;
  --red:#d93025;
  --red-bg:#fde8e6;
  --amber:#c97b00;
  --amber-bg:#fff4dc;
  --mono:'JetBrains Mono',monospace;
  --sans:'DM Sans',sans-serif;
  --display:'Syne',sans-serif;
}
body{background:var(--bg);font-family:var(--sans);color:var(--ink);min-height:100vh;overflow-x:hidden}

/* ─── NAV ─── */
nav{
  background:var(--ink2);
  padding:0 18px;
  position:sticky;top:0;z-index:20;
  box-shadow:0 2px 20px rgba(10,22,40,.25);
  display:flex;align-items:stretch;
}
.nav-inner{display:flex;justify-content:space-between;align-items:center;width:100%;padding:12px 0}
.nav-logo{display:flex;align-items:center;gap:10px}
.nav-hex{width:32px;height:32px;background:var(--teal);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px}
.nav-title{font-family:var(--display);font-size:18px;font-weight:800;color:#fff;letter-spacing:-.3px}
.nav-sub{font-size:9.5px;font-weight:600;color:rgba(255,255,255,.45);letter-spacing:1.2px;text-transform:uppercase;margin-top:1px}
.nav-btns{display:flex;gap:8px;align-items:center}
.nav-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.8);padding:7px 13px;border-radius:10px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--sans);letter-spacing:.3px;transition:all .15s}
.nav-btn:hover{background:rgba(255,255,255,.18)}
.nav-btn.admin-active{background:var(--teal);border-color:var(--teal);color:white}

/* ─── TABS ─── */
.tabs{background:var(--ink2);display:flex;padding:0 18px;border-top:1px solid rgba(255,255,255,.08)}
.tab{flex:1;padding:10px 6px;background:none;border:none;font-family:var(--sans);font-size:11px;font-weight:700;color:rgba(255,255,255,.45);cursor:pointer;border-bottom:3px solid transparent;text-transform:uppercase;letter-spacing:.5px;transition:all .15s}
.tab.on{color:var(--teal);border-bottom-color:var(--teal)}

/* ─── SEARCH BAR ─── */
.search-wrap{background:var(--ink2);padding:10px 16px 20px;display:flex;flex-direction:column;gap:8px}
.search-box{position:relative}
.search-box input{width:100%;padding:12px 16px 12px 44px;border-radius:14px;border:none;font-size:14px;outline:none;font-family:var(--sans);background:white;color:var(--ink);box-shadow:0 4px 20px rgba(0,0,0,.15)}
.search-icon{position:absolute;left:15px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none}
.filter-row{display:flex;gap:7px;flex-wrap:wrap}
.filter-row select{flex:1;min-width:100px;padding:8px 10px;border-radius:10px;border:none;font-family:var(--sans);font-size:12px;font-weight:600;background:rgba(255,255,255,.15);color:white;outline:none;cursor:pointer}
.filter-row select option{color:var(--ink);background:white}
.sort-btn{background:rgba(255,255,255,.15);border:none;color:white;border-radius:10px;padding:8px 13px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--sans);white-space:nowrap;transition:background .15s}
.sort-btn:hover{background:rgba(255,255,255,.25)}
.month-pill{background:white;border-radius:10px;padding:6px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.month-pill label{font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;white-space:nowrap}
.month-pill input[type=month]{border:none;font-family:var(--mono);font-size:12px;font-weight:700;color:var(--ink);outline:none;background:transparent;cursor:pointer}

/* ─── DASHBOARD ─── */
#view-dashboard{padding:14px 14px 20px}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.dash-card{background:white;border-radius:18px;padding:15px 16px;border:1.5px solid var(--border);box-shadow:0 2px 10px rgba(0,0,0,.04)}
.dash-card.full{grid-column:1/-1}
.dc-label{font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.dc-val{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--ink)}
.dc-val.g{color:var(--green)} .dc-val.r{color:var(--red)} .dc-val.t{color:var(--teal)}
.dc-sub{font-size:10px;font-weight:600;color:var(--muted);margin-top:3px}
.dc-bar-wrap{margin-top:10px;height:6px;background:#eef2f5;border-radius:4px;overflow:hidden}
.dc-bar{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--teal),var(--green));transition:width .5s ease}
.status-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0f4f8}
.status-row:last-child{border-bottom:none}
.status-row .sr-lbl{display:flex;align-items:center;gap:8px;font-weight:600;font-size:13px}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-green{background:var(--green)} .dot-amber{background:var(--amber)} .dot-red{background:var(--red)}
.status-row .sr-val{font-family:var(--mono);font-weight:700;font-size:13px}
.top-earner-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #f0f4f8}
.top-earner-row:last-child{border-bottom:none}
.ter-name{font-weight:700;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px}
.ter-net{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--green)}

/* ─── STAFF LIST ─── */
#view-staff{padding:10px 14px 20px;display:flex;flex-direction:column;gap:10px}
.empty{text-align:center;margin-top:52px;color:var(--muted);font-size:14px;line-height:2.4}
.empty-icon{font-size:40px;margin-bottom:8px}

.emp-card{background:white;border-radius:20px;border:1.5px solid var(--border);box-shadow:0 2px 12px rgba(0,0,0,.05);overflow:hidden;cursor:pointer;transition:transform .1s,box-shadow .1s}
.emp-card:active{transform:scale(.985);box-shadow:0 1px 6px rgba(0,0,0,.06)}
.ec-head{padding:14px 16px 10px;display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid #f0f5f4}
.ec-name{font-family:var(--display);font-size:16px;font-weight:700;line-height:1.2}
.status-badge{font-size:9px;font-weight:800;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px;flex-shrink:0}
.s-active{background:var(--green-bg);color:#065f46}
.s-leave{background:var(--amber-bg);color:#92400e}
.s-term{background:var(--red-bg);color:#991b1b}
.ec-meta{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;align-items:center}
.tag-role{background:var(--teal-l);color:var(--teal-d);font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;text-transform:uppercase}
.tag-nat{background:var(--amber-bg);color:var(--amber);font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px}
.ec-contact{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:6px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.call-btn{background:var(--sky);color:var(--ink2);border:none;border-radius:7px;padding:3px 9px;font-size:10px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block}
.wa-btn{background:#e7fdf0;color:#128c7e;border:none;border-radius:7px;padding:3px 9px;font-size:10px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block}
.ec-finance{padding:10px 16px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ef-item{display:flex;flex-direction:column}
.ef-label{font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.ef-val{font-family:var(--mono);font-size:12px;font-weight:700}
.ef-val.g{color:var(--green)} .ef-val.r{color:var(--red)}
.ec-net{padding:10px 16px 13px;border-top:2px dashed var(--border);display:flex;justify-content:space-between;align-items:center}
.ec-net-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.ec-net-val{font-family:var(--mono);font-size:19px;font-weight:800}
.ec-net-val.pos{color:var(--green)} .ec-net-val.neg{color:var(--red)}

/* ─── OVERLAYS ─── */
.overlay{position:fixed;inset:0;z-index:40;display:none;background:rgba(8,18,35,.6);backdrop-filter:blur(6px);align-items:flex-end;justify-content:center}
.overlay.show{display:flex}
.sheet{background:white;width:100%;max-width:500px;border-radius:28px 28px 0 0;display:flex;flex-direction:column;max-height:94vh;box-shadow:0 -16px 60px rgba(0,0,0,.22);margin:0 auto}
.handle{width:40px;height:4px;background:#d1d5db;border-radius:4px;margin:12px auto 4px;flex-shrink:0}
.sheet-body{overflow-y:auto;padding:8px 20px 20px;flex:1}
.sheet-close{width:100%;padding:16px;background:#f5f8fa;font-weight:700;color:var(--muted);border:none;cursor:pointer;font-family:var(--sans);font-size:14px;flex-shrink:0;border-top:1px solid #eef2f5;transition:background .15s}
.sheet-close:active{background:#e8eef2}

/* ─── DETAIL SHEET ─── */
.d-name{font-family:var(--display);font-size:24px;font-weight:800;margin-bottom:6px}
.d-badges{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:20px}
.db{font-size:10px;font-weight:700;padding:4px 12px;border-radius:20px;text-transform:uppercase}
.db-t{background:var(--teal-l);color:var(--teal-d)}
.db-n{background:var(--amber-bg);color:var(--amber)}
.db-b{background:var(--red-bg);color:var(--red)}

.sec{background:#f7fbfa;border-radius:18px;padding:15px 16px;margin-bottom:12px;border:1px solid #deecea}
.sec-ttl{font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.snap-pill{background:var(--teal);color:white;font-size:9px;font-weight:800;padding:3px 10px;border-radius:20px;font-family:var(--mono);letter-spacing:.5px}

.irow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #e8f0ef}
.irow:last-child{border-bottom:none}
.irow .lbl{color:var(--muted);font-weight:600;font-size:12px;min-width:90px}
.irow .val-side{display:flex;align-items:center;gap:6px;flex:1;justify-content:flex-end;flex-wrap:wrap}
.irow .val{font-family:var(--mono);font-weight:700;font-size:12px;text-align:right;word-break:break-all}
.info-edit-btn{background:var(--teal-l);color:var(--teal);border:1px solid var(--teal-m);border-radius:7px;padding:3px 8px;font-size:10px;font-weight:700;cursor:pointer;font-family:var(--sans)}
.info-iedit{display:none;padding:8px 0 4px}
.info-iedit.open{display:block}
.info-iedit-row{display:flex;gap:6px}
.info-iedit input,.info-iedit select,.info-iedit textarea{flex:1;padding:8px 10px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-family:var(--sans);outline:none;color:var(--ink)}
.info-iedit input:focus,.info-iedit select:focus,.info-iedit textarea:focus{border-color:var(--teal)}
.btn-si{background:var(--teal);color:white;border:none;border-radius:10px;padding:8px 14px;font-weight:700;font-size:12px;cursor:pointer;font-family:var(--sans)}
.btn-ci{background:#f0f5f4;color:var(--muted);border:none;border-radius:10px;padding:8px 12px;font-weight:700;font-size:12px;cursor:pointer;font-family:var(--sans)}

.frow{padding:8px 0;border-bottom:1px solid #e8f0ef}
.frow:last-of-type{border-bottom:none}
.frow-top{display:flex;justify-content:space-between;align-items:center}
.frow .lbl{color:var(--muted);font-weight:600;font-size:12px}
.frow .val{font-family:var(--mono);font-weight:700;font-size:13px}
.frow .val.r{color:var(--red)} .frow .val.g{color:var(--green)}
.edit-btn{background:var(--teal-l);color:var(--teal);border:1px solid var(--teal-m);border-radius:8px;padding:4px 10px;font-size:10px;font-weight:700;cursor:pointer;font-family:var(--sans)}
.fedit{display:none;margin-top:8px}
.fedit.open{display:block}
.fedit-row{display:flex;gap:6px;align-items:center}
.fedit input[type=number]{flex:1;padding:8px 10px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-family:var(--sans);outline:none}
.fedit input:focus{border-color:var(--teal)}
.fedit-note{width:100%;padding:7px 10px;border:1.5px solid var(--border);border-radius:10px;font-size:12px;font-family:var(--sans);outline:none;margin-top:6px}
.fedit-note:focus{border-color:var(--teal)}
.div-dash{border:none;border-top:2px dashed var(--border);margin:10px 0}
.net-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0 2px}
.net-row .lbl{font-size:14px;font-weight:800;color:var(--ink)}
.net-row .val{font-family:var(--mono);font-size:22px;font-weight:800}
.net-row .val.pos{color:var(--green)} .net-row .val.neg{color:var(--red)}

.hist-entry{background:white;border:1px solid var(--border);border-radius:12px;padding:10px 13px;margin-top:8px;display:flex;justify-content:space-between;align-items:center}
.hist-month{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--muted)}
.hist-net{font-family:var(--mono);font-size:14px;font-weight:800}
.hist-net.pos{color:var(--green)} .hist-net.neg{color:var(--red)}
.log-card{background:white;border:1px solid var(--border);border-radius:12px;padding:10px 13px;margin-top:8px}
.log-top{display:flex;justify-content:space-between;margin-bottom:5px}
.log-field{font-size:10px;font-weight:800;color:var(--teal);text-transform:uppercase;letter-spacing:.5px}
.log-time{font-family:var(--mono);font-size:10px;color:var(--muted)}
.log-vals{font-size:12px;font-weight:700}
.log-vals .old{color:var(--red)} .log-vals .arr{color:var(--muted);margin:0 5px} .log-vals .nw{color:var(--green)}
.log-note{font-size:11px;color:var(--muted);margin-top:3px;font-style:italic}
.log-empty,.hist-empty{color:var(--muted);font-size:12px;text-align:center;padding:14px 0}
.del-wrap{text-align:center;padding:8px 0 2px}
.del-btn{color:var(--red);font-weight:700;font-size:13px;background:none;border:none;cursor:pointer;font-family:var(--sans)}

/* ─── ADMIN / ADD PANEL ─── */
.adm-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;padding-top:4px}
.adm-hdr h2{font-family:var(--display);font-size:21px;font-weight:800}
.x-btn{background:#f0f5f4;border:none;width:34px;height:34px;border-radius:10px;cursor:pointer;font-size:17px;color:var(--muted)}
.tool-row{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.tool-btn{flex:1;min-width:70px;padding:11px 6px;border:none;border-radius:12px;font-weight:700;font-size:11px;text-transform:uppercase;cursor:pointer;font-family:var(--sans);letter-spacing:.4px}
.tb-teal{background:var(--teal);color:white}
.tb-dark{background:var(--ink2);color:white}
.tb-green{background:var(--green);color:white}
.atabs{display:flex;border-bottom:2px solid #e2efed;margin-bottom:4px}
.atab{flex:1;padding:10px 4px;background:none;border:none;font-family:var(--sans);font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;text-transform:uppercase;letter-spacing:.3px}
.atab.on{color:var(--teal);border-bottom-color:var(--teal)}
.apane{display:none;padding-top:10px}
.apane.on{display:block}
.slbl{font-size:9.5px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.9px;margin-bottom:10px;margin-top:16px;display:block}
.inp{width:100%;padding:12px 14px;background:#f7fbfa;border:1.5px solid var(--border);border-radius:12px;font-size:14px;font-family:var(--sans);outline:none;margin-bottom:8px;color:var(--ink);transition:border-color .15s}
.inp:focus{border-color:var(--teal)}
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.main-save{width:100%;background:var(--teal);color:white;padding:15px;border-radius:16px;font-weight:800;font-size:15px;border:none;cursor:pointer;font-family:var(--sans);margin-top:10px;box-shadow:0 4px 16px rgba(14,159,142,.28)}
.main-save:active{background:var(--teal-d)}

/* ─── LOGIN OVERLAY ─── */
#loginOverlay{position:fixed;inset:0;z-index:60;background:rgba(8,18,35,.85);backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center}
#loginOverlay.show{display:flex}
.login-card{background:white;border-radius:24px;padding:32px 28px;width:90%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-card h2{font-family:var(--display);font-size:22px;font-weight:800;margin-bottom:6px}
.login-card p{font-size:13px;color:var(--muted);margin-bottom:22px;line-height:1.5}
.login-card input{width:100%;padding:13px 16px;border:1.5px solid var(--border);border-radius:12px;font-size:15px;font-family:var(--sans);outline:none;color:var(--ink);margin-bottom:10px;letter-spacing:2px}
.login-card input:focus{border-color:var(--teal)}
.login-card button{width:100%;background:var(--teal);color:white;padding:14px;border-radius:12px;font-weight:800;font-size:15px;border:none;cursor:pointer;font-family:var(--sans);margin-bottom:8px}
.login-cancel{width:100%;background:#f0f5f4;color:var(--muted);padding:12px;border-radius:12px;font-weight:700;font-size:14px;border:none;cursor:pointer;font-family:var(--sans)}
.login-err{color:var(--red);font-size:12px;font-weight:700;text-align:center;margin-top:2px;height:18px}

/* ─── CHANGE PASSWORD ─── */
.chpw-section{background:#f7fbfa;border-radius:14px;padding:14px;border:1px solid var(--border);margin-top:10px}
.chpw-section h4{font-size:12px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px}

/* ─── RESPONSIVE ─── */
.sync-bar{background:rgba(255,255,255,.08);border-top:1px solid rgba(255,255,255,.1);padding:5px 18px;display:flex;align-items:center;gap:7px}
.sync-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:background .3s}
.sd-idle{background:rgba(255,255,255,.3)}.sd-syncing{background:#f59e0b;animation:pulse 1s infinite}.sd-ok{background:#34d399}.sd-error{background:#f87171}
#syncText{font-size:10px;font-weight:700;color:rgba(255,255,255,.6);letter-spacing:.5px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@media(min-width:500px){
  .dash-grid{grid-template-columns:1fr 1fr 1fr}
}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <div class="nav-logo">
      <div class="nav-hex">⬡</div>
      <div>
        <div class="nav-title">ODC STAFF</div>
        <div class="nav-sub">Ali &amp; Claude · v2</div>
      </div>
    </div>
    <div class="nav-btns">
      <button class="nav-btn" id="adminNavBtn" onclick="openAdminFlow()">⚙ Admin</button>
    </div>
  </div>
</nav>
<div class="sync-bar"><span class="sync-dot sd-idle" id="syncDot"></span><span id="syncText">Connecting...</span></div>

<div class="tabs">
  <button class="tab on" onclick="switchView('dashboard',this)">📊 Dashboard</button>
  <button class="tab"    onclick="switchView('staff',this)">👥 Staff</button>
</div>

<div class="search-wrap">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" onkeyup="doSearch()" placeholder="Search name, iqama, mobile...">
  </div>
  <div class="filter-row">
    <select id="filterStatus" onchange="doSearch()">
      <option value="">All Status</option>
      <option value="active">Active</option>
      <option value="leave">On Leave</option>
      <option value="terminated">Terminated</option>
    </select>
    <select id="filterWork" onchange="doSearch()"></select>
    <button class="sort-btn" onclick="cycleSort()">Sort: <span id="sortLabel">Name</span></button>
    <div class="month-pill">
      <label>📅</label>

/* ─── SYNC STATUS UI ─── */
function setSyncUI(state, msg) {
  syncStatus = state;

  const tx = document.getElementById('syncText');
  if(!el) return;
  el.className = 'sync-dot sd-' + state;
  tx.textContent = msg;

/* ─── LOAD FROM SUPABASE ─── */
async function loadFromCloud() {
  setSyncUI('syncing','Syncing...');
  try {
    const { data, error } = await supa.from('employees').select('*').order('updated_at', { ascending: true });
    if(error) throw error;
    employees = data.map(row => ({ _id: row.id, ...row.data }));
    setSyncUI('ok', 'Synced ✓');
    render();
  } catch(e) {
    setSyncUI('error','Sync error');
    console.error(e);
  }
}

/* ─── SAVE ONE EMPLOYEE TO SUPABASE ─── */
async function saveToCloud(emp) {
  setSyncUI('syncing','Saving...');
  try {
    const { _id, ...data } = emp;
    if(_id) {
      const { error } = await supa.from('employees').update({ data, updated_at: new Date().toISOString() }).eq('id', _id);
      if(error) throw error;
    } else {
      const { data: inserted, error } = await supa.from('employees').insert({ data }).select().single();
      if(error) throw error;
      emp._id = inserted.id;
    }
    setSyncUI('ok','Saved ✓');
  } catch(e) {
    setSyncUI('error','Save failed');
    console.error(e);
  }
}

/* ─── DELETE FROM SUPABASE ─── */
async function deleteFromCloud(id) {
  setSyncUI('syncing','Deleting...');
  try {
    const { error } = await supa.from('employees').delete().eq('id', id);
    if(error) throw error;
    setSyncUI('ok','Deleted ✓');
  } catch(e) {
    setSyncUI('error','Delete failed');
    console.error(e);
  }
}

function subscribeRealtime() {
  realtimeSub = supa.channel('employees-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'employees' }, payload => {

/* ─── PASSWORD ─── */
function getPassword() { return localStorage.getItem(PW_STORE) || null; }
async function hashPW(str) {
  const buf = await crypto.subtle.digest('SHA-1', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

  return (parseFloat(s.salary)||0) - (parseFloat(s.advance)||0) - (parseFloat(s.trafficFines)||0) - (parseFloat(s.fines)||0) - (parseFloat(s.finesDlc)||0);
}
function nowStr() {

async function onMonthChange() {
  const mth = getActiveMth();
  for(const e of employees) {
    if(!e.snapshots) e.snapshots = {};
    if(!e.snapshots[mth]) {
      e.snapshots[mth] = { salary:e.salary, advance:e.advance, trafficFines:0, fines:0, finesDlc:0 };
      await saveToCloud(e);

  render();
}
function getSnap(e, mth) {
  if(!e.snapshots) e.snapshots = {};
  if(!e.snapshots[mth]) {
    e.snapshots[mth] = { salary:e.salary, advance:e.advance, trafficFines:e.trafficFines, fines:e.fines, finesDlc:e.finesDlc };
  }
  return e.snapshots[mth];
}

      ${mobileRow()}
      ${infoRow('nat','Nationality',e.nat)}
      ${infoRow('iqama','Iqama',e.iqama)}
      ${infoRow('work','Work Type',e.work)}
      ${infoRow('status','Status',e.status||'active','text',[{v:'active',l:'Active'},{v:'leave',l:'On Leave'},{v:'terminated',l:'Terminated'}])}
      ${infoRow('blood','Blood Type',e.blood)}
      ${infoRow('acc','Accommodation',e.acc)}
      ${infoRow('lic','License',e.lic)}
      ${infoRow('veh','Vehicle',e.veh)}
      ${infoRow('join','Joined',e.join)}
      ${infoRow('leave','Leaving',e.leave)}
      ${infoRow('notes','Notes',e.notes,'textarea')}
    </div>
    <div class="sec">
      <div class="sec-ttl">Finance <span class="snap-pill">${mthLabel}</span>
        ${isAdmin?'<span style="font-size:9px;color:var(--teal);font-style:italic;text-transform:none;font-weight:600">✏️ tap to edit</span>':''}
      </div>
      ${finRow('salary','Total Salary','g',`SAR ${fmt(snap.salary)}`)}
      <hr class="div-dash">
      ${finRow('advance','Advance','r',adv?`− SAR ${fmt(adv)}`:'—')}
      ${finRow('trafficFines','Traffic Fines','r',tf?`− SAR ${fmt(tf)}`:'—')}
      ${finRow('fines','Fines','r',fn?`− SAR ${fmt(fn)}`:'—')}
      ${finRow('finesDlc','Fines by DLC','r',fd?`− SAR ${fmt(fd)}`:'—')}
      <hr class="div-dash">
      <div style="display:flex;justify-content:space-between;padding:6px 0 2px">
        <span style="font-weight:700;font-size:13px">Total Deductions</span>
        <span style="font-family:var(--mono);font-weight:700;color:var(--red)">− SAR ${fmt(tot)}</span>
      </div>
      <div class="net-row">
        <span class="lbl">Net Salary</span>
        <span class="val ${nc}">SAR ${fmt(net)}</span>
      </div>
    </div>
    <div class="sec">
      <div class="sec-ttl">Salary History</div>
      ${buildHistory(e)}
    </div>
    <div class="sec">
      <div class="sec-ttl">Change Log</div>
      ${log.length ? log.map(l=>`
        <div class="log-card">
          <div class="log-top"><span class="log-field">${l.field}</span><span class="log-time">${l.time}</span></div>
          <div class="log-vals"><span class="old">SAR ${fmt(l.oldVal)}</span><span class="arr">→</span><span class="nw">SAR ${fmt(l.newVal)}</span></div>
          ${l.note?`<div class="log-note">📝 ${l.note}</div>`:''}
        </div>`).join('') : '<div class="log-empty">No changes recorded yet.</div>'}
    </div>
    ${(e.iqamaPic||e.licPic)?`
    <div class="sec">
      <div class="sec-ttl">Documents</div>
      ${e.iqamaPic?`<p style="font-size:10px;font-weight:700;color:var(--muted);margin-bottom:6px;text-transform:uppercase">Iqama Photo</p><img src="${e.iqamaPic}" style="width:100%;border-radius:12px;border:1.5px solid var(--border);margin-bottom:12px">`:''}
      ${e.licPic  ?`<p style="font-size:10px;font-weight:700;color:var(--muted);margin-bottom:6px;text-transform:uppercase">License Photo</p><img src="${e.licPic}" style="width:100%;border-radius:12px;border:1.5px solid var(--border)">`:''}
    </div>` : ''}
  `;
}

function buildHistory(e) {
  if(!e.snapshots || !Object.keys(e.snapshots).length) return '<div class="hist-empty">No history yet.</div>';
  const keys = Object.keys(e.snapshots).sort().reverse().slice(0,12);
  return keys.map(k=>{
    const s = e.snapshots[k];
    const net = calcNet(e,s);
    const nc = net>=0?'pos':'neg';
    const [yr,mo] = k.split('-');
    const label = new Date(yr,mo-1).toLocaleString('en-US',{month:'short',year:'numeric'});
    return `<div class="hist-entry"><span class="hist-month">${label}</span><span class="hist-net ${nc}">SAR ${fmt(net)}</span></div>`;
  }).join('');
}

/* ─── INFO EDIT ─── */
function openInfoEdit(field) {
  document.querySelectorAll('.info-iedit').forEach(el=>el.classList.remove('open'));
  const el = document.getElementById('iie-'+field);
  if(el) { el.classList.add('open'); const inp=document.getElementById('iiv-'+field); if(inp) inp.focus(); }
}
function closeInfoEdit(field) { const el=document.getElementById('iie-'+field); if(el) el.classList.remove('open'); }
async function saveInfoField(field) {
  const emp = employees[currentIdx];
  const el  = document.getElementById('iiv-'+field);
  if(!el) return;
  emp[field] = el.tagName==='SELECT' ? el.value : el.value.trim();
  await saveToCloud(emp);
  render(); renderDetail();
}

/* ─── FINANCE EDIT ─── */
function openFinEdit(field) {
  document.querySelectorAll('.fedit').forEach(el=>el.classList.remove('open'));
  const el=document.getElementById('fe-'+field);
  if(el) { el.classList.add('open'); document.getElementById('fv-'+field).focus(); }
}
function closeFinEdit(field) { const el=document.getElementById('fe-'+field); if(el) el.classList.remove('open'); }
async function saveFinField(field) {
  const emp    = employees[currentIdx];
  const mth    = getActiveMth();
  const snap   = getSnap(emp, mth);
  const oldVal = parseFloat(snap[field])||0;
  const newVal = parseFloat(document.getElementById('fv-'+field).value)||0;
  const note   = (document.getElementById('fn-'+field).value||'').trim();
  if(!emp.log) emp.log=[];
  emp.log.push({field:FLABELS[field]||field, oldVal, newVal, note, time:nowStr(), month:mth});
  snap[field]=newVal; emp[field]=newVal;
  await saveToCloud(emp);
  render(); renderDetail();
}

/* ─── AUTH ─── */
function openAdminFlow() {
  if(isAdmin) {
    document.getElementById('adminOverlay').classList.add('show');
  } else {
    document.getElementById('loginInput').value='';
    document.getElementById('loginErr').textContent='';
    document.getElementById('loginOverlay').classList.add('show');
    setTimeout(()=>document.getElementById('loginInput').focus(),300);
  }
}
function closeLogin() { document.getElementById('loginOverlay').classList.remove('show'); }
async function doLogin() {
  const val = document.getElementById('loginInput').value;
  const storedHash = getPassword();
  const hash = await hashPW(val);
  const ok = storedHash ? (hash === storedHash) : (val === 'Aa@102030');
  if(ok) {
    isAdmin = true;
    document.getElementById('loginOverlay').classList.remove('show');
    document.getElementById('adminNavBtn').classList.add('admin-active');
    document.getElementById('adminNavBtn').textContent = '⚙ Admin ✓';
    document.getElementById('adminOverlay').classList.add('show');
    document.getElementById('delWrap').style.display = currentIdx!==null?'block':'none';
  } else {
    document.getElementById('loginErr').textContent = 'Incorrect password. Try again.';
    document.getElementById('loginInput').value='';
    document.getElementById('loginInput').focus();
  }
}
async function changePassword() {
  const cur  = document.getElementById('pwCurrent').value;
  const nw   = document.getElementById('pwNew').value;
  const conf = document.getElementById('pwConfirm').value;
  const msg  = document.getElementById('pwMsg');
  const curHash = await hashPW(cur);
  const _stored = getPassword();
  if(_stored ? (curHash !== _stored) : (cur !== 'Aa@102030')) { msg.style.color='var(--red)'; msg.textContent='❌ Current password incorrect'; return; }
  if(nw.length < 6) { msg.style.color='var(--red)'; msg.textContent='❌ New password too short (min 6)'; return; }
  if(nw !== conf)   { msg.style.color='var(--red)'; msg.textContent='❌ Passwords do not match'; return; }
  const newHash = await hashPW(nw);
  localStorage.setItem(PW_STORE, newHash);
  msg.style.color='var(--green)'; msg.textContent='✅ Password updated!';
  document.getElementById('pwCurrent').value='';
  document.getElementById('pwNew').value='';
  document.getElementById('pwConfirm').value='';
}

/* ─── ADD EMPLOYEE ─── */
function swTab(id, btn) {
  document.querySelectorAll('.apane').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.atab').forEach(b=>b.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  btn.classList.add('on');
}
async function saveEmployee() {
  const name = document.getElementById('nName').value.trim();
  if(!name) return alert('Name is required!');
  const mth          = getActiveMth();
  const salary       = document.getElementById('nSalary').value;
  const advance      = document.getElementById('nAdvance').value;
  const trafficFines = document.getElementById('nTrafficFines').value;
  const fines        = document.getElementById('nFines').value;
  const finesDlc     = document.getElementById('nFinesDlc').value;
  const emp = {
    name, salary, advance, trafficFines, fines, finesDlc,
    mobile:   document.getElementById('nMobile').value,
    nat:      document.getElementById('nNat').value,
    iqama:    document.getElementById('nIqama').value,
    lic:      document.getElementById('nLic').value,
    veh:      document.getElementById('nVeh').value,
    work:     document.getElementById('nWork').value,
    status:   document.getElementById('nStatus').value,
    blood:    document.getElementById('nBlood').value,
    acc:      document.getElementById('nAcc').value,
    join:     document.getElementById('nJoin').value,
    leave:    document.getElementById('nLeave').value,
    notes:    document.getElementById('nNotes').value,
    iqamaPic: document.getElementById('nIqamaPic').value,
    licPic:   document.getElementById('nLicPic').value,
    log: [],
    snapshots: { [mth]: { salary, advance, trafficFines, fines, finesDlc } }
  };
  await saveToCloud(emp);
  employees.push(emp);
  render();
  closeModal('adminOverlay');
  document.querySelectorAll('.inp').forEach(i=>{ if(i.tagName!=='SELECT') i.value=''; });
  document.getElementById('nStatus').value='active';
  swTab('tInfo', document.querySelector('.atab'));
}

/* ─── DELETE ─── */
async function deleteEmployee() {
  if(!isAdmin) return;
  if(confirm('Delete this record permanently?')) {
    const emp = employees[currentIdx];
    if(emp._id) await deleteFromCloud(emp._id);
    employees.splice(currentIdx,1);
    render();
    closeModal('detailOverlay');
  }
}

/* ─── CSV ─── */
function downloadCSV() {
  const mth = getActiveMth();
  const headers = ['Name','Status','Mobile','Nationality','Iqama','Work','Blood','Accommodation','License','Vehicle','Joining','Leaving','Notes','Salary','Advance','Traffic Fines','Fines','Fines by DLC','Net Salary','Month'];
  const rows = employees.map(e=>{
    const snap = getSnap(e,mth);
    return [e.name,e.status||'active',e.mobile,e.nat,e.iqama,e.work,e.blood,e.acc,e.lic,e.veh,e.join,e.leave,e.notes,
      parseFloat(snap.salary)||0, parseFloat(snap.advance)||0, parseFloat(snap.trafficFines)||0,
      parseFloat(snap.fines)||0, parseFloat(snap.finesDlc)||0, calcNet(e,snap), mth
    ].map(v=>`"${String(v||'').replace(/"/g,'""')}"`);
  });
  const csv = [headers.join(','),...rows.map(r=>r.join(','))].join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download = `ODC_Staff_${mth}.csv`; a.click();
}

initMonth();
setSyncUI('syncing','Connecting...');
loadFromCloud().then(()=>{ subscribeRealtime(); });
